<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Checklist — Safe & Secure Locksmith</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --g1: #0f0f0f;
  --g2: #161616;
  --g3: #1e1e1e;
  --g4: #252525;
  --white: #f0e9dc;
  --muted: rgba(240,233,220,0.42);
  --dim: rgba(240,233,220,0.1);
  --gold: #c8a84b;
  --gold-d: rgba(200,168,75,0.12);
  --gold-b: rgba(200,168,75,0.22);
  --red: #e05252;
  --red-d: rgba(224,82,82,0.1);
  --amber: #d4a017;
  --amber-d: rgba(212,160,23,0.1);
  --blue: #4e8fcf;
  --blue-d: rgba(78,143,207,0.1);
  --green: #3a9e6e;
  --green-d: rgba(58,158,110,0.1);
  --purple: #8b5cf6;
  --purple-d: rgba(139,92,246,0.1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.6;min-height:100vh;}
.layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:256px;min-width:256px;background:var(--g1);border-right:1px solid var(--dim);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
.sb-brand{padding:24px 20px 18px;border-bottom:1px solid var(--dim);}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;line-height:1;}
.brand-name span{color:var(--gold);}
.brand-sub{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-top:3px;}
.sb-prog{padding:14px 20px;border-bottom:1px solid var(--dim);}
.prog-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:7px;}
.prog-bar{height:3px;background:var(--g3);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--amber));transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-nums{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.prog-nums .dn{color:var(--gold);font-weight:500;}
.sb-nav{padding:10px 0;flex:1;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 20px;cursor:pointer;transition:background .15s;border-left:2px solid transparent;}
.nav-item:hover{background:var(--g2);}
.nav-item.active{background:var(--g2);border-left-color:var(--gold);}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.nav-info{flex:1;min-width:0;}
.nav-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-count{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:1px;}
.nav-pct{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;}
.sb-foot{padding:14px 20px;border-top:1px solid var(--dim);}
.reset-btn{width:100%;padding:8px;background:none;border:1px solid var(--dim);color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.reset-btn:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
.main{flex:1;padding:44px 44px 80px;max-width:820px;}
.phase{display:none;}
.phase.active{display:block;}
.phase-header{margin-bottom:32px;padding-bottom:22px;border-bottom:1px solid var(--dim);}
.phase-eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:7px;}
.phase-title{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:.9;margin-bottom:10px;}
.phase-desc{font-size:13px;color:var(--muted);max-width:580px;line-height:1.75;}
.phase-stats{display:flex;gap:20px;margin-top:14px;}
.pstat{display:flex;flex-direction:column;}
.pstat-n{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;}
.pstat-l{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:1px;}

/* SECTION */
.section{margin-bottom:28px;}
.section-header{display:flex;align-items:center;gap:10px;padding:9px 14px;margin-bottom:2px;border-radius:2px;}
.section-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;font-weight:500;flex:1;}
.section-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;}

/* TASK */
.task{display:flex;align-items:flex-start;gap:11px;padding:12px 14px;background:var(--g1);border:1px solid transparent;margin-bottom:2px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.task::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .2s;}
.task:hover{background:var(--g2);border-color:var(--dim);}
.task:hover::before{background:var(--gold);}
.task.done{opacity:.5;}
.task.done::before{background:var(--green)!important;}
.task.done .task-text{text-decoration:line-through;text-decoration-color:var(--muted);}
.checkbox{width:17px;height:17px;border:1.5px solid var(--g4);border-radius:2px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--g2);}
.task:hover .checkbox{border-color:var(--gold);}
.task.done .checkbox{background:var(--green);border-color:var(--green);}
.checkmark{opacity:0;transform:scale(.5);transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.task.done .checkmark{opacity:1;transform:scale(1);}
.checkmark svg{width:9px;height:9px;display:block;}
.task-body{flex:1;min-width:0;}
.task-text{font-size:13px;color:var(--white);line-height:1.5;}
.task-note{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.6;font-style:italic;}
.task-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.tag{font-family:'DM Mono',monospace;font-size:8px;padding:2px 6px;border-radius:1px;letter-spacing:.5px;}
.tag-red{background:var(--red-d);color:var(--red);border:1px solid rgba(224,82,82,.2);}
.tag-amber{background:var(--amber-d);color:var(--amber);border:1px solid rgba(212,160,23,.2);}
.tag-blue{background:var(--blue-d);color:var(--blue);border:1px solid rgba(78,143,207,.2);}
.tag-green{background:var(--green-d);color:var(--green);border:1px solid rgba(58,158,110,.2);}
.tag-gold{background:var(--gold-d);color:var(--gold);border:1px solid var(--gold-b);}
.tag-purple{background:var(--purple-d);color:var(--purple);border:1px solid rgba(139,92,246,.2);}
.tag-grey{background:var(--g3);color:var(--muted);border:1px solid var(--dim);}

/* CELEBRATE */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);opacity:0;pointer-events:none;transition:opacity .3s;z-index:998;}
.overlay.show{opacity:1;pointer-events:auto;}
.celebrate{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:var(--g2);border:1px solid var(--gold-b);padding:40px 52px;text-align:center;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;}
.celebrate.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto;}
.cel-emoji{font-size:44px;margin-bottom:10px;}
.cel-title{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold);}
.cel-sub{font-size:12px;color:var(--muted);margin-top:5px;}
.cel-close{margin-top:18px;padding:8px 22px;background:var(--gold);color:var(--bg);border:none;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;font-weight:500;}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
  <div class="sb-brand">
    <div class="brand-name">Safe <span>&</span> Secure</div>
    <div class="brand-sub">SEO MASTER CHECKLIST</div>
  </div>
  <div class="sb-prog">
    <div class="prog-label">OVERALL PROGRESS</div>
    <div class="prog-bar"><div class="prog-fill" id="global-bar" style="width:0%"></div></div>
    <div class="prog-nums"><span><span class="dn" id="global-done">0</span> done</span><span id="global-total">0</span> total</div>
  </div>
  <nav class="sb-nav" id="nav"></nav>
  <div class="sb-foot"><button class="reset-btn" onclick="resetAll()">↺ RESET ALL PROGRESS</button></div>
</div>
<main class="main" id="main"></main>
</div>
<div class="overlay" id="overlay" onclick="closeCelebrate()"></div>
<div class="celebrate" id="celebrate">
  <div class="cel-emoji">🎉</div>
  <div class="cel-title" id="cel-title">Phase Complete!</div>
  <div class="cel-sub" id="cel-sub">You're making serious progress.</div>
  <button class="cel-close" onclick="closeCelebrate()">CONTINUE →</button>
</div>

high-intent customers',tags:[['REVENUE','green'],['MONTH 3','purple']]},{text:'Email 20 strata management companies about preferred vendor rates',note:'One strata contract = 12+ jobs/year. Highest lifetime value client type.',tags:[['REVENUE','green'],['MONTH 4','purple']]}]}]}];

let state={};
function loadState(){try{const s=localStorage.getItem('ssl_seo_v2');state=s?JSON.parse(s):{}}catch(e){state={};}}
function saveState(){try{localStorage.setItem('ssl_seo_v2',JSON.stringify(state));}catch(e){}}
function key(pid,si,ti){return `${pid}_${si}_${ti}`;}
function isDone(pid,si,ti){return !!state[key(pid,si,ti)];}
function toggle(pid,si,ti){const k=key(pid,si,ti);state[k]=!state[k];saveState();updateAll();if(state[k])checkPhaseComplete(pid);}
function resetAll(){if(!confirm('Reset all progress? This cannot be undone.'))return;state={};saveState();updateAll();}

function countPhase(p){let t=0,d=0;p.sections.forEach((s,si)=>s.tasks.forEach((_,ti)=>{t++;if(isDone(p.id,si,ti))d++;}));return{total:t,done:d};}
function countAll(){let t=0,d=0;phases.forEach(p=>{const c=countPhase(p);t+=c.total;d+=c.done;});return{total:t,done:d};}

function buildUI(){
  const nav=document.getElementById('nav'),main=document.getElementById('main');
  nav.innerHTML='';main.innerHTML='';
  phases.forEach((phase,pi)=>{
    const ni=document.createElement('div');
    ni.className='nav-item'+(pi===0?' active':'');
    ni.onclick=()=>showPhase(pi);
    ni.dataset.pi=pi;
    ni.innerHTML=`<div class="nav-dot" style="background:${phase.dot}"></div><div class="nav-info"><div class="nav-title">${phase.title}</div><div class="nav-count" id="nc-${pi}"></div></div><div class="nav-pct" style="color:${phase.color}" id="np-${pi}"></div>`;
    nav.appendChild(ni);

    const pane=document.createElement('div');
    pane.className='phase'+(pi===0?' active':'');
    pane.id=`phase-${pi}`;
    const{total}=countPhase(phase);
    pane.innerHTML=`<div class="phase-header"><div class="phase-eyebrow">${phase.eyebrow}</div><div class="phase-title" style="color:${phase.color}">${phase.title}</div><div class="phase-desc">${phase.desc}</div><div class="phase-stats"><div class="pstat"><div class="pstat-n" id="pd-${pi}" style="color:${phase.color}">0</div><div class="pstat-l">COMPLETED</div></div><div class="pstat"><div class="pstat-n" id="pr-${pi}">${total}</div><div class="pstat-l">REMAINING</div></div><div class="pstat"><div class="pstat-n">${total}</div><div class="pstat-l">TOTAL TASKS</div></div></div></div>`;

    phase.sections.forEach((sec,si)=>{
      const secEl=document.createElement('div');
      secEl.className='section';
      const sh=document.createElement('div');
      sh.className='section-header';
      sh.style.background=sec.color+'18';
      sh.innerHTML=`<div class="section-title" style="color:${sec.color}">${sec.title}</div><div class="section-badge" style="background:${sec.color}22;color:${sec.color};border:1px solid ${sec.color}33">${sec.tasks.length} tasks</div>`;
      secEl.appendChild(sh);
      sec.tasks.forEach((task,ti)=>{
        const el=document.createElement('div');
        el.className='task'+(isDone(phase.id,si,ti)?' done':'');
        el.id=`t-${phase.id}-${si}-${ti}`;
        el.onclick=()=>toggle(phase.id,si,ti);
        const tags=(task.tags||[]).map(([l,c])=>`<span class="tag tag-${c}">${l}</span>`).join('');
        el.innerHTML=`<div class="checkbox"><div class="checkmark"><svg viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div><div class="task-body"><div class="task-text">${task.text}</div>${task.note?`<div class="task-note">${task.note}</div>`:''} ${tags?`<div class="task-tags">${tags}</div>`:''}</div>`;
        secEl.appendChild(el);
      });
      pane.appendChild(secEl);
    });
    main.appendChild(pane);
  });
}

function updateAll(){
  phases.forEach((phase,pi)=>{
    const{total,done}=countPhase(phase);
    const pct=total?Math.round(done/total*100):0;
    const nc=document.getElementById(`nc-${pi}`);
    const np=document.getElementById(`np-${pi}`);
    const pd=document.getElementById(`pd-${pi}`);
    const pr=document.getElementById(`pr-${pi}`);
    if(nc)nc.textContent=`${done}/${total} done`;
    if(np)np.textContent=pct+'%';
    if(pd)pd.textContent=done;
    if(pr)pr.textContent=total-done;
    phase.sections.forEach((sec,si)=>sec.tasks.forEach((_,ti)=>{
      const el=document.getElementById(`t-${phase.id}-${si}-${ti}`);
      if(el)el.classList.toggle('done',isDone(phase.id,si,ti));
    }));
  });
  const{total,done}=countAll();
  const pct=total?Math.round(done/total*100):0;
  const bar=document.getElementById('global-bar');
  if(bar)bar.style.width=pct+'%';
  document.getElementById('global-done').textContent=done;
  document.getElementById('global-total').textContent=total;
}

function showPhase(pi){
  document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(`phase-${pi}`).classList.add('active');
  document.querySelector(`[data-pi="${pi}"]`).classList.add('active');
  window.scrollTo(0,0);
}

const celebrated=new Set();
function checkPhaseComplete(pid){
  if(celebrated.has(pid))return;
  const phase=phases.find(p=>p.id===pid);
  if(!phase)return;
  const{total,done}=countPhase(phase);
  if(done===total&&total>0){
    celebrated.add(pid);
    document.getElementById('cel-title').textContent=`${phase.title} Complete!`;
    document.getElementById('cel-sub').textContent=`All ${total} tasks done. Time to move to the next phase.`;
    document.getElementById('celebrate').classList.add('show');
    document.getElementById('overlay').classList.add('show');
  }
}
function closeCelebrate(){
  document.getElementById('celebrate').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

loadState();buildUI();updateAll();
</script>
